# @decision DEC-MARKET-008
# @title Documentation freshness workflow via GitHub Actions
# @status accepted
# @rationale Scheduled weekly check that opens a GitHub issue when Claude Code's
#   official plugin documentation changes. Advisory only — a human reviews and
#   updates SKILL.md. Prevents the plugin-dev skill from silently going stale
#   as Claude Code evolves. Uses curl + sha256sum (no extra dependencies) and
#   gh CLI for issue creation. Fingerprints stored in .github/doc-fingerprints.json.

name: Check Plugin Docs Freshness

on:
  schedule:
    # Every Monday at 06:00 UTC
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  check-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch plugin documentation pages
        id: fetch
        run: |
          mkdir -p /tmp/plugin-docs

          # Fetch each official docs page
          curl -sSL "https://code.claude.ai/docs/en/plugins" \
            -o /tmp/plugin-docs/plugins.html \
            --max-time 30 \
            --retry 3 \
            || echo "FETCH_FAILED=plugins" >> "$GITHUB_OUTPUT"

          curl -sSL "https://code.claude.ai/docs/en/plugin-marketplaces" \
            -o /tmp/plugin-docs/plugin-marketplaces.html \
            --max-time 30 \
            --retry 3 \
            || echo "FETCH_FAILED=plugin-marketplaces" >> "$GITHUB_OUTPUT"

          curl -sSL "https://code.claude.ai/docs/en/plugins-reference" \
            -o /tmp/plugin-docs/plugins-reference.html \
            --max-time 30 \
            --retry 3 \
            || echo "FETCH_FAILED=plugins-reference" >> "$GITHUB_OUTPUT"

      - name: Compute fingerprints
        id: fingerprints
        run: |
          PLUGINS_HASH=$(sha256sum /tmp/plugin-docs/plugins.html | awk '{print $1}')
          MARKETPLACES_HASH=$(sha256sum /tmp/plugin-docs/plugin-marketplaces.html | awk '{print $1}')
          REFERENCE_HASH=$(sha256sum /tmp/plugin-docs/plugins-reference.html | awk '{print $1}')

          echo "plugins_hash=${PLUGINS_HASH}" >> "$GITHUB_OUTPUT"
          echo "marketplaces_hash=${MARKETPLACES_HASH}" >> "$GITHUB_OUTPUT"
          echo "reference_hash=${REFERENCE_HASH}" >> "$GITHUB_OUTPUT"

          echo "New fingerprints:"
          echo "  plugins:            ${PLUGINS_HASH}"
          echo "  plugin-marketplaces: ${MARKETPLACES_HASH}"
          echo "  plugins-reference:   ${REFERENCE_HASH}"

      - name: Load stored fingerprints
        id: stored
        run: |
          FINGERPRINT_FILE=".github/doc-fingerprints.json"

          if [ -f "$FINGERPRINT_FILE" ]; then
            STORED_PLUGINS=$(jq -r '.plugins // ""' "$FINGERPRINT_FILE")
            STORED_MARKETPLACES=$(jq -r '."plugin-marketplaces" // ""' "$FINGERPRINT_FILE")
            STORED_REFERENCE=$(jq -r '."plugins-reference" // ""' "$FINGERPRINT_FILE")
          else
            echo "No fingerprint file found — treating all pages as changed."
            STORED_PLUGINS=""
            STORED_MARKETPLACES=""
            STORED_REFERENCE=""
          fi

          echo "stored_plugins=${STORED_PLUGINS}" >> "$GITHUB_OUTPUT"
          echo "stored_marketplaces=${STORED_MARKETPLACES}" >> "$GITHUB_OUTPUT"
          echo "stored_reference=${STORED_REFERENCE}" >> "$GITHUB_OUTPUT"

          echo "Stored fingerprints:"
          echo "  plugins:            ${STORED_PLUGINS}"
          echo "  plugin-marketplaces: ${STORED_MARKETPLACES}"
          echo "  plugins-reference:   ${STORED_REFERENCE}"

      - name: Detect changes and open issue
        id: detect
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PLUGINS_HASH: ${{ steps.fingerprints.outputs.plugins_hash }}
          MARKETPLACES_HASH: ${{ steps.fingerprints.outputs.marketplaces_hash }}
          REFERENCE_HASH: ${{ steps.fingerprints.outputs.reference_hash }}
          STORED_PLUGINS: ${{ steps.stored.outputs.stored_plugins }}
          STORED_MARKETPLACES: ${{ steps.stored.outputs.stored_marketplaces }}
          STORED_REFERENCE: ${{ steps.stored.outputs.stored_reference }}
        run: |
          CHANGED_PAGES=""

          if [ "$PLUGINS_HASH" != "$STORED_PLUGINS" ]; then
            CHANGED_PAGES="${CHANGED_PAGES}\n- \`plugins\`: https://code.claude.ai/docs/en/plugins"
          fi

          if [ "$MARKETPLACES_HASH" != "$STORED_MARKETPLACES" ]; then
            CHANGED_PAGES="${CHANGED_PAGES}\n- \`plugin-marketplaces\`: https://code.claude.ai/docs/en/plugin-marketplaces"
          fi

          if [ "$REFERENCE_HASH" != "$STORED_REFERENCE" ]; then
            CHANGED_PAGES="${CHANGED_PAGES}\n- \`plugins-reference\`: https://code.claude.ai/docs/en/plugins-reference"
          fi

          if [ -z "$CHANGED_PAGES" ]; then
            echo "No documentation changes detected. Nothing to do."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "changed=true" >> "$GITHUB_OUTPUT"
          echo "Documentation changes detected in:${CHANGED_PAGES}"

          # Check if an open issue already exists for this
          EXISTING=$(gh issue list \
            --label "doc-freshness" \
            --state open \
            --json number \
            --jq 'length')

          if [ "$EXISTING" -gt "0" ]; then
            echo "Open doc-freshness issue already exists — skipping issue creation."
            exit 0
          fi

          ISSUE_BODY="## Plugin docs may have changed

The following Claude Code documentation pages appear to have been updated since the last check.
Review \`skills/plugin-dev/SKILL.md\` and update it if the changes affect plugin authoring guidance.

### Changed pages
$(printf '%b' "$CHANGED_PAGES")

### What to check
- New plugin manifest fields in \`plugin.json\`
- New or removed hook events
- New source types (github, git, npm, pip, etc.)
- CLI command changes (\`/plugin install\`, \`/plugin validate\`, etc.)
- Marketplace format changes

### Action required
1. Read the changed pages linked above
2. Compare with current \`skills/plugin-dev/SKILL.md\`
3. Update the skill file if anything is out of date
4. Close this issue when done

*Opened automatically by the doc-freshness workflow.*"

          gh issue create \
            --title "Plugin docs may have changed — review SKILL.md" \
            --body "$ISSUE_BODY" \
            --label "doc-freshness" \
            || gh issue create \
              --title "Plugin docs may have changed — review SKILL.md" \
              --body "$ISSUE_BODY"

      - name: Update fingerprint file
        if: steps.detect.outputs.changed == 'true'
        env:
          PLUGINS_HASH: ${{ steps.fingerprints.outputs.plugins_hash }}
          MARKETPLACES_HASH: ${{ steps.fingerprints.outputs.marketplaces_hash }}
          REFERENCE_HASH: ${{ steps.fingerprints.outputs.reference_hash }}
        run: |
          cat > .github/doc-fingerprints.json << EOF
          {
            "plugins": "${PLUGINS_HASH}",
            "plugin-marketplaces": "${MARKETPLACES_HASH}",
            "plugins-reference": "${REFERENCE_HASH}",
            "last_updated": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF

          # Normalize indentation (jq for consistent formatting)
          jq . .github/doc-fingerprints.json > /tmp/fp.json && mv /tmp/fp.json .github/doc-fingerprints.json

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/doc-fingerprints.json
          git commit -m "chore: update doc fingerprints [skip ci]"
          git push
